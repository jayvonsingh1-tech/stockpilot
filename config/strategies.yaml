# Strategy Configuration for StockPilot

# Trend Following Strategy
trend_following:
  enabled: true
  weight: 0.30
  parameters:
    ema_short: 20
    ema_medium: 50
    ema_long: 200
    min_trend_strength: 0.6  # ADX threshold
    pullback_percent: 2.0    # % pullback to EMA for entry
    volume_multiplier: 1.2   # Volume must be X times average
  
# Mean Reversion Strategy  
mean_reversion:
  enabled: true
  weight: 0.25
  parameters:
    bollinger_period: 20
    bollinger_std: 2.0
    rsi_oversold: 30
    rsi_overbought: 70
    min_deviation_percent: 2.0  # Min % from mean to trigger
    
# Breakout Strategy
breakout:
  enabled: true
  weight: 0.25
  parameters:
    consolidation_days: 5
    breakout_volume_multiplier: 1.5
    min_consolidation_range: 3.0  # Min % range
    max_consolidation_range: 10.0 # Max % range
    stop_loss_percent: 2.0
    
# Value + Catalyst Strategy
value_catalyst:
  enabled: true
  weight: 0.20
  parameters:
    max_pe_ratio: 25
    min_revenue_growth: 10.0  # % YoY
    max_debt_to_equity: 1.5
    min_free_cash_flow: 0     # Positive FCF required
    catalyst_days_ahead: 30   # Look for catalysts within X days
